<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify You're Human</title>

  <!-- Google reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Le7j4ssAAAAAI2lh6Ulmr_PXIZfzXG8I2gqT0Di"></script>

  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --bg-header: #111827;
      --border: #334155;
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --danger: #ef4444;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .header {
      background: var(--bg-header);
      padding: 18px;
      text-align: center;
      font-weight: 600;
      font-size: clamp(16px, 2vw, 20px);
      border-bottom: 1px solid var(--border);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 15px;
    }

    .banner {
      width: min(100%, 400px);
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100%;
      max-width: 280px;
      height: auto;
      aspect-ratio: 280 / 80;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
      display: block;
    }

    .box {
      width: min(100%, 400px);
      background: var(--bg-card);
      padding: 25px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(0,0,0,.4);
      text-align: center;
    }

    .box h2 {
      margin-bottom: 18px;
      font-size: clamp(18px, 3vw, 22px);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text-main);
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #000;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: .2s;
    }

    button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .message {
      margin-top: 14px;
      min-height: 20px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
    }

    #redirecting {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid var(--primary);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    #redirecting p {
      margin-top: 12px;
      color: var(--primary);
      font-weight: 600;
    }

    .footer {
      background: var(--bg-header);
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 15px;
      font-size: 13px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width:480px) {

      .box {
        padding: 20px;
      }

      .header {
        padding: 16px;
      }

      input,
      button {
        padding: 13px;
      }

      .footer {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<div class="header">
  Secure Human Verification System
</div>

<div class="main">

  <div class="banner">
    <canvas id="quizCanvas"></canvas>
  </div>

  <div class="box" id="quiz-box">

    <h2>Solve the question below</h2>

    <input
      type="text"
      id="answer"
      placeholder="Your answer"
      autocomplete="off">

    <button id="verifyButton" onclick="checkAnswer()">
      Verify
    </button>

    <p id="message" class="message"></p>

  </div>

  <div id="redirecting">
    <div class="spinner"></div>
    <p>Redirecting...</p>
  </div>

</div>

<div class="footer">
  © 2025 Secure Access Portal. All rights reserved.
</div>

<script src="script.js" defer></script>

</body>
</html>
